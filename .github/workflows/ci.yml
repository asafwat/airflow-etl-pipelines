# Continuous Integration for the Airflow DAG repository.
#
# What this catches:
#   - Python syntax errors in any DAG file
#   - Imports that fail (missing deps, typos)
#   - Lint issues (style, unused vars, unsafe patterns)
#   - DAGs that fail to construct (`DagBag` validates the whole directory)
#
# Without these checks, a bad DAG only fails when Airflow's scheduler tries
# to parse it at runtime — by which point it's already deployed to the
# cluster via gitSync. CI catches it at PR time.
#
# Note on the install step: we install Airflow with its OFFICIAL CONSTRAINTS
# FILE. Without it, pip resolves transitive deps to latest versions, which
# regularly breaks Airflow's internals (e.g. structlog 25.x removed `Styles`
# which Airflow 3.1.0's logging module still imports). The constraints file
# pins every transitive dep to the exact version Airflow's CI tested against.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AIRFLOW_VERSION: "3.1.0"
  PYTHON_VERSION: "3.12"

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Airflow with constraints + dev deps
        run: |
          python -m pip install --upgrade pip
          CONSTRAINTS="https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-${PYTHON_VERSION}.txt"
          pip install "apache-airflow==${AIRFLOW_VERSION}" --constraint "${CONSTRAINTS}"
          # Install the K8s provider + dev tools separately (NOT under constraints
          # because the constraints file already pins the K8s provider via Airflow).
          pip install apache-airflow-providers-cncf-kubernetes ruff==0.7.4 pytest==8.3.4

      - name: Lint with ruff
        run: ruff check dags/ tests/

      - name: Validate DAGs (import + DagBag)
        run: pytest tests/ -v
        env:
          AIRFLOW__CORE__LOAD_EXAMPLES: "False"
          AIRFLOW__CORE__UNIT_TEST_MODE: "True"
          AIRFLOW__CORE__EXECUTOR: "SequentialExecutor"
